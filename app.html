<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRX PREDICTOR · DASHBOARD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06080f;
      --panel: #0b1120;
      --panel2: #0e1628;
      --border: #1a2f4a;
      --gold: #f5c842;
      --gold2: #c8a020;
      --cyan: #00d4ff;
      --red: #ff4455;
      --green: #00e87a;
      --purple: #b06cff;
      --orange: #ff8c42;
      --dim: #3a5a7a;
      --text: #b8d0e8;
      --text2: #6a8aa8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--cyan));
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 8px;
      background: linear-gradient(135deg, var(--gold), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header sub {
      font-size: 0.6rem;
      letter-spacing: 4px;
      color: var(--dim);
      display: block;
      margin-top: 4px;
    }

    .logout-btn {
      position: absolute;
      top: 16px;
      right: 20px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 6px 16px;
      border-radius: 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── PREDICTION CARD ── */
    .prediction-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 30px;
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .prediction-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--cyan), transparent);
    }

    .period-display {
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--dim);
      margin-bottom: 8px;
    }

    .period-display span {
      color: var(--text);
    }

    .timer-display {
      font-size: 1.8rem;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 6px;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .result-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 6rem;
      letter-spacing: 12px;
      line-height: 1;
      margin: 10px 0;
      transition: all 0.3s;
    }

    .result-display.big {
      color: var(--green);
      text-shadow: 0 0 60px rgba(0,232,122,0.3);
    }

    .result-display.small {
      color: var(--red);
      text-shadow: 0 0 60px rgba(255,68,85,0.3);
    }

    .result-display.waiting {
      color: var(--dim);
      text-shadow: none;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 20px;
      border-radius: 20px;
      font-size: 0.6rem;
      letter-spacing: 3px;
      margin-top: 10px;
    }

    .status-badge.live {
      background: rgba(0,232,122,0.1);
      border: 1px solid var(--green);
      color: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-badge.waiting {
      background: rgba(58,90,122,0.1);
      border: 1px solid var(--dim);
      color: var(--dim);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── HISTORY ── */
    .history-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .history-header h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 4px;
      color: var(--text);
    }

    .history-header span {
      font-size: 0.6rem;
      color: var(--dim);
      letter-spacing: 2px;
    }

    .history-grid {
      max-height: 300px;
      overflow-y: auto;
    }

    .history-grid::-webkit-scrollbar {
      width: 4px;
    }
    .history-grid::-webkit-scrollbar-track {
      background: var(--bg);
    }
    .history-grid::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .history-row {
      display: grid;
      grid-template-columns: 1.5fr 0.8fr 0.8fr 0.5fr;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(26,47,74,0.3);
      font-size: 0.7rem;
      transition: background 0.2s;
    }

    .history-row:hover {
      background: rgba(245,200,66,0.03);
    }

    .history-row.header {
      color: var(--dim);
      font-size: 0.55rem;
      letter-spacing: 2px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 8px;
      margin-bottom: 4px;
    }

    .history-row .win {
      color: var(--green);
    }

    .history-row .lose {
      color: var(--red);
    }

    .history-row .pred-big {
      color: var(--green);
    }

    .history-row .pred-small {
      color: var(--red);
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .stat-box {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .stat-box .num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
    }

    .stat-box .num.gold { color: var(--gold); }
    .stat-box .num.green { color: var(--green); }
    .stat-box .num.red { color: var(--red); }

    .stat-box .label {
      font-size: 0.5rem;
      letter-spacing: 2px;
      color: var(--dim);
      margin-top: 2px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .header h1 { font-size: 1.8rem; letter-spacing: 4px; }
      .result-display { font-size: 4rem; letter-spacing: 6px; }
      .timer-display { font-size: 1.4rem; }
      .prediction-card { padding: 30px 20px; }
      .stats-bar { grid-template-columns: 1fr; }
      .history-row { grid-template-columns: 1fr 0.6fr 0.6fr 0.4fr; font-size: 0.6rem; }
      .logout-btn { position: static; margin-top: 12px; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- HEADER -->
    <div class="header">
      <h1>TRX PREDICTOR</h1>
      <sub>◆ LIVE PREDICTION DASHBOARD ◆</sub>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <!-- PREDICTION CARD -->
    <div class="prediction-card">
      <div class="period-display">NEXT PERIOD: <span id="nextPeriod">......</span></div>
      <div class="timer-display" id="countdown">00:60</div>
      <div class="result-display waiting" id="predictionResult">--</div>
      <div class="status-badge waiting" id="statusBadge">● WAITING</div>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar">
      <div class="stat-box">
        <div class="num gold" id="totalPredictions">0</div>
        <div class="label">TOTAL PREDICTIONS</div>
      </div>
      <div class="stat-box">
        <div class="num green" id="wins">0</div>
        <div class="label">WINS</div>
      </div>
      <div class="stat-box">
        <div class="num red" id="losses">0</div>
        <div class="label">LOSSES</div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="history-card">
      <div class="history-header">
        <h3>📊 RECENT PREDICTIONS</h3>
        <span>LAST 10</span>
      </div>
      <div class="history-grid" id="historyGrid">
        <div class="history-row header">
          <span>PERIOD</span>
          <span>PRED</span>
          <span>ACTUAL</span>
          <span>W/L</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── CONFIG ──────────────────────────────────────────────────────
    const API_URL = 'https://draw.ar-lottery01.com/TrxWinGo/TrxWinGo_1M/GetHistoryIssuePage.json';

    // ─── STATE ──────────────────────────────────────────────────────
    let lastTwoNumbers = [];
    let predictionsHistory = [];
    let activePrediction = { period: null, prediction: null };
    let audioCtx = null;
    let beepEnabled = false;
    let clockInterval = null;
    let fetchInterval = null;

    // ─── DOM REFS ──────────────────────────────────────────────────
    const nextPeriodEl = document.getElementById('nextPeriod');
    const countdownEl = document.getElementById('countdown');
    const resultEl = document.getElementById('predictionResult');
    const statusEl = document.getElementById('statusBadge');
    const historyGrid = document.getElementById('historyGrid');
    const totalPredEl = document.getElementById('totalPredictions');
    const winsEl = document.getElementById('wins');
    const lossesEl = document.getElementById('losses');

    // ─── LOGOUT ────────────────────────────────────────────────────
    function logout() {
      if (clockInterval) clearInterval(clockInterval);
      if (fetchInterval) clearInterval(fetchInterval);
      window.location.href = 'login.html';
    }

    // ─── TIMER & PREDICTION LOGIC ──────────────────────────────────
    function getCurrentPeriodForTime(date) {
      const y = date.getUTCFullYear();
      const m = String(date.getUTCMonth() + 1).padStart(2, '0');
      const d = String(date.getUTCDate()).padStart(2, '0');
      const hours = date.getUTCHours();
      const minutes = date.getUTCMinutes();
      const totalMinutes = hours * 60 + minutes;
      const periodSuffix = 10001 + totalMinutes;
      return `${y}${m}${d}1000${periodSuffix}`;
    }

    function getNextPeriod() {
      const now = new Date();
      const nextTime = new Date(now.getTime() + 60000);
      return getCurrentPeriodForTime(nextTime);
    }

    async function fetchLatestList() {
      const url = API_URL + '?ts=' + Date.now();
      try {
        const resp = await fetch(url, {
          headers: {
            'Accept': 'application/json, text/plain, */*',
            'Content-Type': 'application/json',
            'Origin': 'https://ar-lottery01.com',
            'Referer': 'https://ar-lottery01.com/',
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }
        });
        if (!resp.ok) return null;
        const json = await resp.json();
        if (json && json.data && Array.isArray(json.data.list)) {
          return json.data.list.map(item => ({
            period: item.issueNumber,
            number: item.number !== undefined ? Number(item.number) : null
          })).filter(item => item.number !== null && item.period);
        }
        return null;
      } catch (e) {
        return null;
      }
    }

    async function fetchResultAndMatch(previousPeriod) {
      const list = await fetchLatestList();
      if (!list || list.length === 0) return;
      const latest = list[0];
      if (!latest.period || latest.number === undefined) return;
      const actualNum = latest.number;
      const actual = actualNum >= 5 ? 'BIG' : 'SMALL';
      const entry = predictionsHistory.find(p => p.period === previousPeriod && p.actual === null);
      if (entry) {
        entry.actual = actual;
        entry.win = (entry.prediction === actual);
        renderHistory();
        updateStats();
        playBeep();
      }
      if (list.length >= 2) {
        lastTwoNumbers = [list[1].number, latest.number];
      }
    }

    function updateTimerAndPeriod() {
      const now = new Date();
      const seconds = now.getUTCSeconds();
      const remaining = 60 - seconds;
      const timerStr = `00:${String(remaining).padStart(2, '0')}`;
      countdownEl.textContent = timerStr;

      const nextPeriod = getNextPeriod();
      nextPeriodEl.textContent = nextPeriod;

      if (seconds === 0) {
        const lastGen = localStorage.getItem('lastGenMinute') || '';
        const currentMinuteTag = nextPeriod;
        if (lastGen !== currentMinuteTag) {
          localStorage.setItem('lastGenMinute', currentMinuteTag);

          // Check previous result
          if (activePrediction.period) {
            fetchResultAndMatch(activePrediction.period);
          }

          // Generate new prediction
          if (lastTwoNumbers.length === 2) {
            const sum = lastTwoNumbers[0] + lastTwoNumbers[1];
            const lastDigit = sum % 10;
            const prediction = lastDigit >= 5 ? 'BIG' : 'SMALL';
            activePrediction = { period: nextPeriod, prediction };
            resultEl.textContent = prediction;
            resultEl.className = `result-display ${prediction.toLowerCase()}`;
            statusEl.textContent = '● LIVE';
            statusEl.className = 'status-badge live';

            predictionsHistory.push({ period: nextPeriod, prediction, actual: null, win: null });
            if (predictionsHistory.length > 20) predictionsHistory.shift();
            renderHistory();
            updateStats();
            playBeep();
          } else {
            activePrediction = { period: nextPeriod, prediction: 'BIG' };
            resultEl.textContent = 'BIG';
            resultEl.className = 'result-display big';
            statusEl.textContent = '● LIVE';
            statusEl.className = 'status-badge live';

            predictionsHistory.push({ period: nextPeriod, prediction: 'BIG', actual: null, win: null });
            renderHistory();
            updateStats();
            playBeep();
          }
        }
      }
    }

    // ─── RENDER ─────────────────────────────────────────────────────
    function renderHistory() {
      let html = '<div class="history-row header"><span>PERIOD</span><span>PRED</span><span>ACTUAL</span><span>W/L</span></div>';
      const recent = predictionsHistory.slice(-10).reverse();
      for (let p of recent) {
        const winClass = p.win === true ? 'win' : (p.win === false ? 'lose' : '');
        const winSymbol = p.win === true ? 'W' : (p.win === false ? 'L' : '—');
        const predClass = p.prediction === 'BIG' ? 'pred-big' : 'pred-small';
        const shortPeriod = p.period ? p.period.slice(-8) : '......';
        html += `<div class="history-row">
          <span>${shortPeriod}</span>
          <span class="${predClass}">${p.prediction || '?'}</span>
          <span>${p.actual || '?'}</span>
          <span class="${winClass}">${winSymbol}</span>
        </div>`;
      }
      historyGrid.innerHTML = html;
    }

    function updateStats() {
      const total = predictionsHistory.filter(p => p.win !== null).length;
      const wins = predictionsHistory.filter(p => p.win === true).length;
      const losses = predictionsHistory.filter(p => p.win === false).length;
      totalPredEl.textContent = total;
      winsEl.textContent = wins;
      lossesEl.textContent = losses;
    }

    // ─── BEEP ──────────────────────────────────────────────────────
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      beepEnabled = true;
    }

    function playBeep() {
      if (!beepEnabled || !audioCtx) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => beep());
      } else {
        beep();
      }
    }

    function beep() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.15;
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    // ─── INIT ──────────────────────────────────────────────────────
    async function initialFetch() {
      const list = await fetchLatestList();
      if (list && list.length >= 2) {
        lastTwoNumbers = [list[1].number, list[0].number];
      }
    }

    function startEngine() {
      initAudio();
      initialFetch().then(() => {
        if (lastTwoNumbers.length === 2) {
          const sum = lastTwoNumbers[0] + lastTwoNumbers[1];
          const lastDigit = sum % 10;
          const prediction = lastDigit >= 5 ? 'BIG' : 'SMALL';
          const nextPeriod = getNextPeriod();
          activePrediction = { period: nextPeriod, prediction };
          resultEl.textContent = prediction;
          resultEl.className = `result-display ${prediction.toLowerCase()}`;
          statusEl.textContent = '● LIVE';
          statusEl.className = 'status-badge live';

          predictionsHistory.push({ period: nextPeriod, prediction, actual: null, win: null });
          renderHistory();
          updateStats();
        }
      });

      if (clockInterval) clearInterval(clockInterval);
      clockInterval = setInterval(updateTimerAndPeriod, 200);

      if (fetchInterval) clearInterval(fetchInterval);
      fetchInterval = setInterval(async () => {
        const list = await fetchLatestList();
        if (list && list.length >= 2) {
          lastTwoNumbers = [list[1].number, list[0].number];
        }
      }, 10000);
    }

    // ─── START ─────────────────────────────────────────────────────
    startEngine();
  </script>

</body>
</html>
